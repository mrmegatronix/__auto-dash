<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDash · Network Directory & Quick Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #020408;
      --bg2:       #05080f;
      --surface:   #0a0f1d;
      --surface2:  #161d31;
      --border:    rgba(99,179,255,0.1);
      --border-bright: rgba(99,179,255,0.25);
      --accent:    #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.4);
      --sec:       #f43f5e;
      --green:     #10b981;
      --orange:    #f59e0b;
      --text:      #f8fafc;
      --text2:     #94a3b8;
      --text3:     #64748b;
      --radius:    14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      width: 100%;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { font-size: 1.4rem; filter: drop-shadow(0 0 8px var(--accent-glow)); }
    .brand h1 { font-size: 1.1rem; font-weight: 900; letter-spacing: -0.03em; color: #fff; text-transform: uppercase; }

    .nav-tabs { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
    .tab { padding: 6px 16px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s; color: var(--text2); text-decoration: none; }
    .tab.active { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent-glow); }
    .tab:hover:not(.active) { background: rgba(255,255,255,0.05); color: #fff; }

    /* Filter & Control Bar */
    .control-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: var(--radius);
    }
    
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      flex: 1;
      min-width: 250px;
    }
    .search-box input {
      background: none;
      border: none;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      width: 100%;
    }
    
    .filter-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      padding: 6px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover { border-color: var(--accent); color: #fff; }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 10px var(--accent-glow); }

    .btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-p { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }
    .btn-p:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }

    /* Custom Creator Panel */
    #creator-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: expand 0.3s ease;
    }
    @keyframes expand { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.7rem; font-weight: 800; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
    .form-input {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: #fff;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }

    /* Links Grid */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .link-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .link-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 0 1px rgba(59,130,246,0.15);
    }

    .link-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .link-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .link-card:hover .link-icon { transform: scale(1.1) rotate(-5deg); background: rgba(59,130,246,0.1); border-color: var(--accent); }

    .tag {
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(59,130,246,0.1);
      color: var(--accent2);
      border: 1px solid rgba(59,130,246,0.15);
    }
    .tag.discovered { background: rgba(16,185,129,0.1); color: var(--green); border-color: rgba(16,185,129,0.15); }
    .tag.custom { background: rgba(245,158,11,0.1); color: var(--orange); border-color: rgba(245,158,11,0.15); }

    .link-content h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .link-content p {
      font-size: 0.8rem;
      color: var(--text2);
      line-height: 1.5;
      min-height: 36px;
    }

    .link-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.03);
    }
    
    .dest-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
      max-width: 75%;
    }
    
    .go-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text);
      opacity: 0.7;
      transition: all 0.2s;
    }
    .link-card:hover .go-btn { opacity: 1; color: var(--accent); }
    .link-card:hover .go-btn svg { transform: translateX(3px); }

    .del-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 4px;
      display: none;
      transition: all 0.2s;
    }
    .del-btn:hover { color: var(--sec); background: rgba(244,63,94,0.1); }
    .link-card:hover .del-btn { display: block; }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text2);
    }

  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <h1>AutoDash</h1>
    </div>
    
    <nav class="nav-tabs">
      <a href="index.html" class="tab">Network</a>
      <a href="links.html" class="tab active">Intel</a>
    </nav>
  </header>

  <!-- Control & Filter Panel -->
  <div class="control-bar">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search hosts, ports, or service names..." oninput="filterLinks()">
    </div>
    
    <div class="filter-chips">
      <span class="chip active" onclick="setFilter('all', this)">All</span>
      <span class="chip" onclick="setFilter('discovered', this)">Discovered Services</span>
      <span class="chip" onclick="setFilter('local', this)">Local Interfaces</span>
      <span class="chip" onclick="setFilter('custom', this)">Custom Shortcuts</span>
    </div>

    <button class="btn btn-p" onclick="toggleCreator()">➕ Custom Link</button>
  </div>

  <!-- Custom Link Form Creator -->
  <div id="creator-panel">
    <h3 style="font-size:0.95rem; font-weight:800; margin-bottom:15px; text-transform:uppercase; color:#fff;">Register Custom Shortcut</h3>
    <form id="creator-form" onsubmit="addCustomLink(event)">
      <div class="form-grid">
        <div class="form-group">
          <label for="c-name">Service Name</label>
          <input type="text" id="c-name" class="form-input" placeholder="e.g. Plex, Synology" required>
        </div>
        <div class="form-group">
          <label for="c-url">Target URL</label>
          <input type="url" id="c-url" class="form-input" placeholder="http://192.168.1.100:32400" required>
        </div>
        <div class="form-group">
          <label for="c-emoji">Emoji Icon</label>
          <input type="text" id="c-emoji" class="form-input" placeholder="🎬" maxlength="2" required>
        </div>
        <div class="form-group">
          <label for="c-desc">Description</label>
          <input type="text" id="c-desc" class="form-input" placeholder="Network Media Server..." required>
        </div>
      </div>
      <div style="display:flex; justify-content:flex-end; gap: 10px;">
        <button type="button" class="btn" style="background:var(--bg2); color:var(--text2);" onclick="toggleCreator()">Cancel</button>
        <button type="submit" class="btn btn-p">Save Shortcut</button>
      </div>
    </form>
  </div>

  <!-- Main Links Grid -->
  <div class="links-grid" id="grid">
    <!-- Links will be loaded dynamically here -->
  </div>
</div>

<script>
// Static Base Links
const STATIC_LINKS = [
  {
    name: "Grocy Installation",
    url: "http://grocy.local",
    emoji: "🥕",
    desc: "Your ERP solution for your kitchen. Manage stocks, recipes, and shopping lists in one place.",
    type: "local"
  },
  {
    name: "Barcode Buddy",
    url: "http://barcode-buddy.local",
    emoji: "🧾",
    desc: "The companion for Grocy. Scan barcodes to quickly update your inventory and track products.",
    type: "local"
  },
  {
    name: "Search Google",
    url: "https://www.google.com",
    emoji: "🔍",
    desc: "Quick access to the web. Find documentation, resources, and answers outside the local network.",
    type: "local"
  },
  {
    name: "SecDash",
    url: "../__sec-DASH/index.html",
    emoji: "🛡️",
    desc: "Advanced security dashboard and vulnerability scanner for the local network.",
    type: "local"
  }
];

// PORT INTEL descriptors for matching icons and names in dynamic scanner services
const SERVICE_INTEL = {
  80: { n: 'HTTP Web Service', e: '🌐', d: 'Standard unencrypted web server interface' },
  443: { n: 'HTTPS Secure Server', e: '🔒', d: 'Secure encrypted web interface' },
  22: { n: 'SSH Remote Shell', e: '💻', d: 'Secure shell remote administration interface' },
  3000: { n: 'Development Server', e: '📦', d: 'React, Node, or dev environment interface' },
  3001: { n: 'Alt Dev Server', e: '📦', d: 'Alternative developer testing interface' },
  8080: { n: 'HTTP Management Console', e: '⚙️', d: 'Alternate web admin or proxy interface' },
  8443: { n: 'Secure Admin Console', e: '⚙️', d: 'Alternate secure web administration tool' },
  9000: { n: 'Portainer Dashboard', e: '🐳', d: 'Docker container management web tool' }
};

let currentFilter = 'all';

function toggleCreator() {
  const panel = document.getElementById('creator-panel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

function loadAllLinks() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  let allItems = [];

  // 1. Add Static Base Links
  STATIC_LINKS.forEach(item => allItems.push(item));

  // 2. Add Discovered Scanner Services (from localStorage)
  try {
    const scanned = JSON.parse(localStorage.getItem('dash_scanned_devices') || '[]');
    scanned.forEach(dev => {
      // Find ports that have web interfaces
      dev.ports.forEach(p => {
        const intel = SERVICE_INTEL[p] || { n: `Port ${p} Web`, e: '🌐', d: `Dynamic service running on port ${p}` };
        
        // Only treat typical web-accessible ports as clickable links
        if ([80, 443, 3000, 3001, 8000, 8080, 8443, 9000].includes(p)) {
          // Resolve label
          let devLabel = dev.ip;
          const knownRegistry = JSON.parse(localStorage.getItem('dash_known_ips') || '[]');
          
          allItems.push({
            name: `${intel.n} (${dev.ip})`,
            url: `http://${dev.ip}:${p}`,
            emoji: intel.e,
            desc: `${intel.d} detected on device ${dev.ip}.`,
            type: 'discovered',
            ip: dev.ip,
            port: p
          });
        }
      });
    });
  } catch(e) { console.error('Failed to parse scanned devices', e); }

  // 3. Add Custom User Shortcuts (from localStorage)
  try {
    const custom = JSON.parse(localStorage.getItem('dash_custom_links') || '[]');
    custom.forEach((item, index) => {
      allItems.push({
        ...item,
        type: 'custom',
        index: index // keep reference for deletion
      });
    });
  } catch(e) { console.error('Failed to parse custom links', e); }

  // 4. Render and Filter
  const searchVal = document.getElementById('search-input').value.toLowerCase();
  
  const filtered = allItems.filter(item => {
    // Tab category filter
    if (currentFilter !== 'all' && item.type !== currentFilter) return false;
    
    // Search text filter
    if (searchVal) {
      const matchName = item.name.toLowerCase().includes(searchVal);
      const matchDesc = item.desc.toLowerCase().includes(searchVal);
      const matchUrl = item.url.toLowerCase().includes(searchVal);
      return matchName || matchDesc || matchUrl;
    }
    
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results">
      <h3 style="font-size:1rem; font-weight:700; color:var(--text); margin-bottom:6px;">No shortcuts found</h3>
      <p style="font-size:0.8rem; color:var(--text3);">Try adjusting your search filter or category selectors.</p>
    </div>`;
    return;
  }

  filtered.forEach(item => {
    const tagLabel = item.type === 'discovered' ? 'Discovered' : item.type === 'custom' ? 'Custom' : 'Local';
    const tagClass = item.type;
    
    const card = document.createElement('div');
    card.className = 'link-card';
    
    // Make whole card clickable or click handles
    card.innerHTML = `
      <div class="link-header">
        <div class="link-icon">${item.emoji}</div>
        <span class="tag ${tagClass}">${tagLabel}</span>
      </div>
      <div class="link-content">
        <h2>${item.name}</h2>
        <p>${item.desc}</p>
      </div>
      <div class="link-footer">
        <span class="dest-url">${item.url}</span>
        <span class="go-btn">
          Open Interface
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition: transform 0.2s;">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </span>
      </div>
    `;
    
    // Handle click to destination
    card.addEventListener('click', (e) => {
      // Don't trigger if clicked delete button
      if (e.target.closest('.del-btn')) return;
      window.open(item.url, '_blank');
    });

    // Add delete button for custom links
    if (item.type === 'custom') {
      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.innerHTML = '🗑️';
      delBtn.title = 'Delete Shortcut';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        deleteCustomLink(item.index);
      };
      card.appendChild(delBtn);
    }
    
    grid.appendChild(card);
  });
}

function setFilter(type, el) {
  currentFilter = type;
  
  // Set active chip style
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  
  loadAllLinks();
}

function filterLinks() {
  loadAllLinks();
}

function addCustomLink(e) {
  e.preventDefault();
  
  const name = document.getElementById('c-name').value.trim();
  const url = document.getElementById('c-url').value.trim();
  const emoji = document.getElementById('c-emoji').value.trim();
  const desc = document.getElementById('c-desc').value.trim();
  
  try {
    const custom = JSON.parse(localStorage.getItem('dash_custom_links') || '[]');
    custom.push({ name, url, emoji, desc });
    localStorage.setItem('dash_custom_links', JSON.stringify(custom));
    
    // Reset form
    document.getElementById('creator-form').reset();
    toggleCreator();
    
    // Reload UI
    loadAllLinks();
  } catch(err) { console.error('Failed to add custom link', err); }
}

function deleteCustomLink(index) {
  if (confirm('Delete this custom shortcut?')) {
    try {
      const custom = JSON.parse(localStorage.getItem('dash_custom_links') || '[]');
      custom.splice(index, 1);
      localStorage.setItem('dash_custom_links', JSON.stringify(custom));
      loadAllLinks();
    } catch(err) { console.error('Failed to delete custom link', err); }
  }
}

// Initial Load
document.addEventListener('DOMContentLoaded', () => {
  loadAllLinks();
});
</script>
</body>
</html>
