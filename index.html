<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDash · Network Command & Security</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020408;
      --bg2: #05080f;
      --surface: #0a0f1d;
      --surface-bright: #161d31;
      --border: rgba(99,179,255,0.1);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.4);
      --sec: #f43f5e;
      --green: #10b981;
      --orange: #f59e0b;
      --red: #ef4444;
      --grey: #475569;
      --text: #f8fafc;
      --text2: #94a3b8;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 0px solid transparent;
      transition: border 0.3s;
    }

    /* Edge Alerts */
    .alert-orange { border: 12px solid var(--orange) !important; animation: edge-blink 1s infinite; }
    .alert-red { border: 12px solid var(--red) !important; animation: edge-blink 0.5s infinite; }
    @keyframes edge-blink { 0%, 100% { border-color: transparent; } 50% { border-color: inherit; } }


    header { 
        display: flex; align-items: center; padding: 12px 24px; gap: 16px; 
        background: rgba(8, 12, 20, 0.8); backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border); position: relative; z-index: 1000;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { font-size: 1.4rem; filter: drop-shadow(0 0 8px var(--accent-glow)); }
    .brand h1 { font-size: 1.1rem; font-weight: 900; letter-spacing: -0.03em; color: #fff; text-transform: uppercase; }

    .nav-tabs { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
    .tab { padding: 6px 16px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s; color: var(--text2); text-decoration: none; }
    .tab.active { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent-glow); }
    .tab:hover:not(.active) { background: rgba(255,255,255,0.05); color: #fff; }

    .hdr-control { display: flex; align-items: center; gap: 8px; }
    .hdr-input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 6px 10px; border-radius: 6px; font-family: 'JetBrains Mono'; font-size: 0.75rem; width: 110px; transition: 0.2s; }
    .hdr-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px var(--accent-glow); }
    .hdr-select { background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
    
    .btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-p { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }
    .btn-s { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
    .btn-p:hover { background: #4e92ff; }

    /* WAN indicator with timestamp */
    .wan-block { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 0 15px; border-left: 1px solid var(--border); }
    .wan-time { font-size: 0.6rem; color: var(--text2); font-family: 'JetBrains Mono'; font-weight: 600; }

    main { flex: 1; padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; position: relative; overflow: hidden; }

    /* View Switcher */
    .view-container { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    
    /* GRID VIEW */
    #grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
      gap: 8px;
      padding: 15px;
      flex: 1;
      align-content: start;
      overflow-y: auto;
    }
    .device-cell {
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 8px 0;
      min-height: 52px;
    }
    .device-cell:hover { transform: scale(1.2); z-index: 50; border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); background: var(--surface-bright); }
    .cell-ip { font-size: 0.6rem; font-family: 'JetBrains Mono'; font-weight: 700; opacity: 0.8; line-height: 1; color: #fff; }
    .cell-dot { width: 8px; height: 8px; border-radius: 50%; background: #222; margin-bottom: 2px; transition: 0.3s; }

    /* Scan Progress Bar */
    #scan-progress { height: 3px; background: var(--surface); width: 100%; border-radius: 2px; overflow: hidden; }
    #scan-progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width 0.3s; border-radius: 2px; }

    /* Internet Status */
    .inet-indicator { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 700; }
    .inet-dot { width: 10px; height: 10px; border-radius: 50%; transition: 0.3s; }
    .inet-up { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .inet-down { background: var(--red); box-shadow: 0 0 8px var(--red); animation: cell-blink 0.5s infinite; }
    
    /* Cell States */
    .state-known { background: rgba(34, 197, 94, 0.2); border-color: var(--green); }
    .state-known .cell-dot { background: var(--green); box-shadow: 0 0 10px var(--green); }
    
    .state-unknown { background: rgba(245, 158, 11, 0.2); border-color: var(--orange); animation: cell-blink 1s infinite; }
    .state-unknown .cell-dot { background: var(--orange); box-shadow: 0 0 10px var(--orange); }
    
    .state-risk { background: rgba(244, 63, 94, 0.15); border-color: var(--sec); animation: cell-blink 0.8s infinite; }
    .state-risk .cell-dot { background: var(--sec); box-shadow: 0 0 12px var(--sec); }
    
    .state-offline-anim { background: rgba(239, 68, 68, 0.2); border-color: var(--red); animation: cell-blink 0.5s infinite; }
    .state-offline-anim .cell-dot { background: var(--red); box-shadow: 0 0 10px var(--red); }
    
    .state-offline { background: #1a1a1a; border-color: var(--grey); }
    .state-offline .cell-dot { background: var(--grey); }
    
    .state-dead { background: #000; border-color: #111; }
    .state-dead .cell-dot { background: #111; }

    @keyframes cell-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Sidebar Panel */
    /* Sidebar Panel (Reactive) */
    #details-panel {
      position: fixed; right: 0; top: 0; width: clamp(320px, 30vw, 500px); height: 100vh;
      background: var(--bg2); border-left: 2px solid var(--accent);
      padding: 30px 25px; display: none; overflow-y: auto;
      box-shadow: -10px 0 40px rgba(0,0,0,0.6); z-index: 2000;
      animation: sideIn 0.3s ease;
    }
    #details-panel.sec-border { border-color: var(--sec); }
    @keyframes sideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    .port-links { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
    .port-link-card { 
      padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); 
      border-radius: 8px; text-decoration: none; color: var(--text); display: flex;
      flex-direction: column; gap: 4px; transition: 0.2s;
    }
    .port-link-card:hover { border-color: var(--accent); transform: translateX(-4px); }
    .port-risky { border-color: var(--sec) !important; }
    .risk-tag { font-size: 0.55rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; display: inline-block; width: fit-content; }
    .risk-high { background: var(--sec); color: white; }
    .risk-med { background: var(--orange); color: #000; }
    .risk-low { background: var(--green); color: #000; }
    .risk-critical { background: #7f1d1d; color: white; }
    .det-section { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
    .det-section h4 { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .svc-match { padding: 8px; background: rgba(59,130,246,0.1); border: 1px solid var(--accent); border-radius: 6px; font-size: 0.75rem; margin-top: 6px; }

    /* List View */
    /* List View (Reactive) */
    #list-view { 
        display: none; 
        grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); 
        gap: 12px; 
        overflow-y: auto; 
        flex: 1; 
        padding: 15px;
        scrollbar-width: thin;
        scrollbar-color: var(--accent) transparent;
    }
    .host-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; font-size: 0.8rem;
    }
    .host-card-ip { font-family: 'JetBrains Mono'; font-size: 0.85rem; font-weight: 700; }
    .host-card-ports { display: flex; flex-wrap: wrap; gap: 4px; }
    .host-card-port { padding: 2px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-size: 0.65rem; font-family: 'JetBrains Mono'; color: var(--accent); }

    .stats-floating { position: fixed; bottom: 30px; right: 40px; display: flex; gap: 15px; }
    .stat-chip { background: var(--surface); border: 1px solid var(--border); padding: 8px 18px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; display: flex; gap: 8px; align-items: center; }



    #scan-log { position: fixed; bottom: 30px; left: 40px; width: 400px; max-height: 120px; background: rgba(0,0,0,0.7); font-size: 0.7rem; font-family: 'JetBrains Mono'; color: var(--text2); overflow-y: auto; padding: 10px; border-radius: 8px; z-index: 1500; }


  </style>
</head>
<body id="main-body">



  <header>
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <h1 id="brand-title">AutoDash</h1>
    </div>
    <div class="nav-tabs">
      <a href="index.html" class="tab active" id="tab-net">Network</a>
      <div class="tab" onclick="toggleSecMode()" id="tab-sec">Security</div>
      <a href="links.html" class="tab">Intel</a>
    </div>

    <div class="hdr-control">
      <input type="text" id="subnet-input" value="192.168.1" class="hdr-input" title="Subnet">
      <select id="port-preset" onchange="updatePresetInfo()" class="hdr-select">
        <option value="common">Standard</option>
        <option value="web">Web</option>
        <option value="extended">Infra</option>
        <option value="intensive">Deep</option>
        <option value="security">🔴 SecAudit</option>
        <option value="allip">🔵 All Ports</option>
      </select>
      <button class="btn btn-s" onclick="toggleView()"><span id="view-mode-label">GRID</span></button>
      <button class="btn btn-p" onclick="startScan()" id="scan-btn">⚡ SCAN</button>
    </div>

    <div style="margin-left: auto; display: flex; gap: 8px; align-items: center;">
      <div class="wan-block">
        <div class="inet-indicator"><div class="inet-dot inet-up" id="inet-dot"></div><span id="inet-label">WAN ✓</span></div>
        <span class="wan-time" id="wan-time">—</span>
      </div>
      <div class="stat-chip" style="border-color: var(--green);"><span style="color: var(--green)">●</span> <span id="count-online">0</span></div>
      <div class="stat-chip" style="border-color: var(--sec);"><span style="color: var(--sec)">●</span> <span id="count-risk">0</span></div>
      <div class="stat-chip" style="border-color: var(--orange);"><span style="color: var(--orange)">●</span> <span id="count-unknown">0</span></div>
    </div>
  </header>
  <div id="scan-progress"><div id="scan-progress-fill"></div></div>

  <main>

    <div class="view-container">
      <div id="grid-view"></div>
      <div id="list-view"></div>
    </div>

    <div id="details-panel">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
        <div>
          <h2 id="det-ip" style="font-family: 'JetBrains Mono'; font-size: 1.4rem;">192.168.1.1</h2>
          <p id="det-host" style="color: var(--text2); font-size: 0.8rem;">Resolving...</p>
        </div>
        <button onclick="closeDetails()" style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;">×</button>
      </div>
      <div id="det-info" style="font-size: 0.75rem; color: var(--text3); display: flex; flex-direction: column; gap: 5px;"></div>
      <div class="port-links" id="det-links"></div>
    </div>

    <div id="scan-log"></div>



    <div class="stats-floating">
      <div class="stat-chip">DNS: <span id="info-dns" style="color: var(--accent);">8.8.8.8</span></div>
      <div class="stat-chip">ARP: <span id="info-arp" style="color: var(--text2);">Active</span></div>
      <div class="stat-chip">NET: <span id="info-net" style="color: var(--text2);">192.168.1.0/24</span></div>
    </div>
  </main>

<script>
const PORT_PRESETS = {
  common: [22, 80, 443, 8080, 8443, 3000],
  web: [80, 443, 8000, 8080, 8443, 8888, 9000],
  extended: [21, 22, 23, 25, 53, 110, 143, 445, 1883, 3306, 5432, 6379],
  intensive: [21,22,23,25,53,80,110,111,135,139,143,443,445,548,587,631,993,995,1025,1723,1883,2049,3000,3001,3128,3306,3389,5000,5060,5432,5900,6379,8000,8080,9000,27017],
  security: [21,22,23,25,53,80,110,135,139,143,443,445,587,993,995,1433,1723,3306,3389,5060,5432,5900,8080,8443,27017],
  allip: [...Array.from({length:1024},(_, i)=>i+1), 1080,1433,1521,1723,1883,2049,3000,3001,3128,3306,3389,5000,5060,5432,5900,5984,6379,6667,8000,8080,8443,8888,9000,9090,9200,11211,27017,28017]
};
const PORT_INTEL = {
  21:{n:'FTP',r:'HIGH',d:'Unencrypted file transfer'},22:{n:'SSH',r:'MED',d:'Secure shell'},23:{n:'Telnet',r:'CRITICAL',d:'Unencrypted remote login'},25:{n:'SMTP',r:'MED',d:'Email relay'},53:{n:'DNS',r:'MED',d:'Domain resolver'},80:{n:'HTTP',r:'LOW',d:'Web server'},110:{n:'POP3',r:'HIGH',d:'Unencrypted mail'},111:{n:'RPCBind',r:'HIGH',d:'RPC services'},135:{n:'MSRPC',r:'HIGH',d:'Windows RPC'},139:{n:'NetBIOS',r:'HIGH',d:'Windows shares'},143:{n:'IMAP',r:'MED',d:'Email access'},443:{n:'HTTPS',r:'LOW',d:'Encrypted web'},445:{n:'SMB',r:'CRITICAL',d:'File sharing - WannaCry vector'},548:{n:'AFP',r:'MED',d:'Apple filing'},587:{n:'SMTP-Sub',r:'LOW',d:'Mail submission'},631:{n:'CUPS',r:'MED',d:'Print server'},993:{n:'IMAPS',r:'LOW',d:'Secure IMAP'},995:{n:'POP3S',r:'LOW',d:'Secure POP3'},1433:{n:'MSSQL',r:'CRITICAL',d:'Microsoft SQL'},1723:{n:'PPTP',r:'HIGH',d:'VPN - known exploits'},1883:{n:'MQTT',r:'HIGH',d:'IoT messaging'},2049:{n:'NFS',r:'HIGH',d:'Network filesystem'},3000:{n:'Dev',r:'MED',d:'Dev server'},3001:{n:'Dev-Alt',r:'MED',d:'Dev server alt'},3128:{n:'Proxy',r:'MED',d:'HTTP proxy'},3306:{n:'MySQL',r:'HIGH',d:'Database'},3389:{n:'RDP',r:'CRITICAL',d:'Remote Desktop'},5000:{n:'UPnP',r:'HIGH',d:'Universal PnP'},5060:{n:'SIP',r:'HIGH',d:'VoIP'},5432:{n:'Postgres',r:'HIGH',d:'Database'},5900:{n:'VNC',r:'CRITICAL',d:'Remote screen'},6379:{n:'Redis',r:'HIGH',d:'In-memory DB'},8000:{n:'Web-Alt',r:'LOW',d:'Alt web'},8080:{n:'HTTP-Proxy',r:'LOW',d:'Alt web/proxy'},8443:{n:'HTTPS-Alt',r:'LOW',d:'Alt secure web'},9000:{n:'Portainer',r:'MED',d:'Container mgmt'},27017:{n:'MongoDB',r:'CRITICAL',d:'NoSQL database'}
};

let devices = [], knownIps = JSON.parse(localStorage.getItem('dash_known_ips')||'[]');
let knownRegistry = [], serviceApps = [];
let viewMode = 'GRID', scanning = false, abortCtl = null, secMode = false;

// Load external registries (JSON + CSV)
async function loadRegistries() {
  try {
    const r = await fetch('known-devices.json'); const j = await r.json();
    knownRegistry = j.devices || [];
    knownRegistry.forEach(d => { if (!knownIps.includes(d.ip)) knownIps.push(d.ip); });
    log(`Loaded ${knownRegistry.length} known devices from JSON`);
  } catch(e) { log('known-devices.json not found'); }
  // Load CSV known hosts
  try {
    const r = await fetch('known-hosts.csv'); const txt = await r.text();
    const lines = txt.trim().split('\n').slice(1); // skip header
    let csvCount = 0;
    lines.forEach(line => {
      const [ip, label, type, icon, notes] = line.split(',').map(s => s.trim());
      if (ip && !knownRegistry.find(d => d.ip === ip)) {
        knownRegistry.push({ ip, label: label||ip, type: type||'device', icon: icon||'📌', notes: notes||'' });
        csvCount++;
      }
      if (ip && !knownIps.includes(ip)) knownIps.push(ip);
    });
    if (csvCount) log(`Loaded ${csvCount} devices from known-hosts.csv`);
  } catch(e) { log('known-hosts.csv not found'); }
  localStorage.setItem('dash_known_ips', JSON.stringify(knownIps));
  try {
    const r = await fetch('service-apps.json'); serviceApps = await r.json();
    log(`Loaded ${serviceApps.length} service signatures`);
  } catch(e) { log('service-apps.json not found'); }
}

function getRegistryDevice(ip) { return knownRegistry.find(d => d.ip === ip); }

function matchServices(ports) {
  if (!serviceApps.length || !ports.length) return [];
  return serviceApps.filter(app => {
    if (!app.port) return false;
    const appPorts = String(app.port).split(',').map(p => parseInt(p.trim()));
    return appPorts.some(p => ports.includes(p));
  }).slice(0, 5);
}

function getRisk(port) { return PORT_INTEL[port] || { n: `Port ${port}`, r: 'LOW', d: 'Unknown service' }; }
function riskClass(r) { return r === 'CRITICAL' ? 'risk-critical' : r === 'HIGH' ? 'risk-high' : r === 'MED' ? 'risk-med' : 'risk-low'; }

function hasHighRisk(ports) { return ports.some(p => { const i = PORT_INTEL[p]; return i && (i.r === 'HIGH' || i.r === 'CRITICAL'); }); }

function initDevices() {
  const subnet = document.getElementById('subnet-input').value;
  devices = Array.from({length: 254}, (_, i) => ({
    ip: `${subnet}.${i+1}`, id: i+1, status: 'DEAD', hostname: null, ports: [],
    lastSeen: localStorage.getItem(`last_seen_${i+1}`) || null
  }));
  renderGrid();
}

function renderGrid() {
  const c = document.getElementById('grid-view');
  c.innerHTML = devices.map(d => {
    let sc = 'state-dead';
    if (d.status === 'ONLINE') sc = hasHighRisk(d.ports) && secMode ? 'state-risk' : 'state-known';
    if (d.status === 'UNKNOWN') sc = 'state-unknown';
    if (d.status === 'OFFLINE_ANIM') sc = 'state-offline-anim';
    if (d.status === 'OFFLINE') sc = 'state-offline';
    if (d.lastSeen && Date.now() - new Date(d.lastSeen).getTime() > 86400000) sc = 'state-dead';
    const reg = getRegistryDevice(d.ip);
    const label = reg ? reg.icon : '';
    return `<div class="device-cell ${sc}" onclick="showDetails(${d.id})" id="cell-${d.id}" title="${d.ip}${reg ? ' - '+reg.label : ''}">
      <div class="cell-dot"></div><div class="cell-ip">${label}.${d.id}</div></div>`;
  }).join('');
}

async function startScan() {
  if (scanning) { abortCtl.abort(); finishScan(); return; }
  scanning = true; abortCtl = new AbortController();
  document.getElementById('scan-btn').textContent = '⏹ STOP';
  speak('Starting network scan');
  log('Starting subnet scan...');
  const ports = PORT_PRESETS[document.getElementById('port-preset').value];
  const BS = 15;
  for (let i = 0; i < devices.length; i++) {
    if (abortCtl.signal.aborted) break;
    const d = devices[i]; let found = false;
    for (let j = 0; j < ports.length; j += BS) {
      const batch = ports.slice(j, j+BS);
      await Promise.all(batch.map(async p => {
        try {
          const ac = new AbortController();
          const t = setTimeout(() => ac.abort(), 1000);
          await fetch(`http://${d.ip}:${p}`, {mode:'no-cors', signal:ac.signal});
          clearTimeout(t);
          if (!d.ports.includes(p)) d.ports.push(p);
          found = true;
        } catch(e) {}
      }));
    }
    found ? handleDeviceOnline(d) : handleDeviceOffline(d);
    if (i % 10 === 0) renderGrid();
    updateStats();
    document.getElementById('scan-progress-fill').style.width = ((i+1)/devices.length*100)+'%';
  }
  document.getElementById('scan-progress-fill').style.width = '100%';
  setTimeout(() => { document.getElementById('scan-progress-fill').style.width = '0%'; }, 2000);
  finishScan();
}

function handleDeviceOnline(d) {
  const was = d.status==='DEAD'||d.status==='OFFLINE'||d.status==='OFFLINE_ANIM';
  const known = knownIps.includes(d.ip);
  if (was) {
    d.status = known ? 'ONLINE' : 'UNKNOWN';
    speak(known ? "Known device online: "+d.ip : "Unknown device connected");
    if (!known) triggerEdgeAlert('orange');
    log(`Device Up: ${d.ip} (${known?'Known':'UNKNOWN'})`);
  }
  d.lastSeen = new Date().toISOString();
  localStorage.setItem(`last_seen_${d.id}`, d.lastSeen);
}

function handleDeviceOffline(d) {
  if (d.status==='ONLINE'||d.status==='UNKNOWN') {
    d.status = 'OFFLINE_ANIM';
    speak("Device offline", true); triggerEdgeAlert('red');
    log(`Device Offline: ${d.ip}`, 'red');
    setTimeout(() => { if (d.status==='OFFLINE_ANIM') { d.status='OFFLINE'; renderGrid(); } }, 60000);
  }
}

function triggerEdgeAlert(c) {
  const b = document.getElementById('main-body');
  b.className = 'alert-'+c; setTimeout(() => b.className='', 5000);
}

function speak(text, female=false) {
  const m = new SpeechSynthesisUtterance(text);
  if (female) { const v = speechSynthesis.getVoices().find(v => v.name.includes('female')||v.lang.includes('GB')); if (v) m.voice=v; }
  speechSynthesis.speak(m);
}


function toggleView() {
  viewMode = viewMode==='GRID'?'LIST':'GRID';
  document.getElementById('view-mode-label').textContent = viewMode;
  document.getElementById('grid-view').style.display = viewMode==='GRID'?'grid':'none';
  document.getElementById('list-view').style.display = viewMode==='LIST'?'grid':'none';
  if (viewMode==='LIST') renderList();
}

function renderList() {
  const c = document.getElementById('list-view');
  const sorted = [...devices].sort((a,b) => {
    const order = {ONLINE:0, UNKNOWN:1, OFFLINE_ANIM:2, OFFLINE:3, DEAD:4};
    return (order[a.status]||4) - (order[b.status]||4);
  });
  c.innerHTML = sorted.map(d => {
    const reg = getRegistryDevice(d.ip);
    const isDead = d.status==='DEAD';
    const isOn = d.status==='ONLINE';
    const borderCol = isOn ? 'var(--green)' : d.status==='UNKNOWN' ? 'var(--orange)' : d.status==='OFFLINE_ANIM' ? 'var(--red)' : 'var(--border)';
    const statusCol = isOn ? 'var(--green)' : d.status==='UNKNOWN' ? 'var(--orange)' : d.status==='OFFLINE_ANIM' ? 'var(--red)' : 'var(--grey)';
    const pi = d.ports.map(p => { const r = getRisk(p); return `<span class="host-card-port">${p} ${r.n}</span>`; }).join('');
    return `<div class="host-card" onclick="showDetails(${d.id})" style="cursor:pointer;border-color:${borderCol};${isDead?'opacity:0.3':''}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="host-card-ip">${d.ip}</span>
        <span style="font-size:0.65rem;color:${statusCol}">${d.status}</span>
      </div>
      ${reg ? `<span style="font-size:0.7rem;color:var(--text2)">${reg.icon} ${reg.label}</span>` : ''}
      <div class="host-card-ports">${pi || `<span style="color:var(--grey);font-size:0.65rem">${isDead?'—':'No ports'}</span>`}</div>
    </div>`;
  }).join('');
}

function toggleSecMode() {
  secMode = !secMode;
  document.getElementById('tab-sec').classList.toggle('active', secMode);
  document.getElementById('brand-title').textContent = secMode ? 'Security Audit' : 'AutoDash Command';
  document.body.style.setProperty('--accent', secMode ? '#f43f5e' : '#3b82f6');
  renderGrid(); updateStats();
  log(secMode ? '🔴 Security Audit Mode ENABLED' : '🔵 Network Mode restored');
}

function showDetails(id) {
  const d = devices[id-1], panel = document.getElementById('details-panel');
  const reg = getRegistryDevice(d.ip);
  document.getElementById('det-ip').textContent = d.ip;
  document.getElementById('det-host').textContent = reg ? `${reg.icon} ${reg.label}` : (d.hostname || 'Unknown Host');

  const info = document.getElementById('det-info');
  const riskPorts = d.ports.filter(p => PORT_INTEL[p] && (PORT_INTEL[p].r==='HIGH'||PORT_INTEL[p].r==='CRITICAL'));
  info.innerHTML = `
    <span>Status: <b style="color:${d.status==='ONLINE'?'var(--green)':d.status==='UNKNOWN'?'var(--orange)':'var(--red)'}">${d.status}</b></span>
    <span>Last Seen: ${d.lastSeen ? new Date(d.lastSeen).toLocaleString() : 'Never'}</span>
    <span>Known: ${knownIps.includes(d.ip)?'✅ YES':'❌ NO'}</span>
    ${reg ? `<span>Type: ${reg.type} — ${reg.notes}</span>` : ''}
    ${riskPorts.length ? `<span style="color:var(--sec)">⚠ ${riskPorts.length} risky port(s) open</span>` : ''}
  `;

  const links = document.getElementById('det-links');
  links.innerHTML = '<h4 style="font-size:0.7rem;color:var(--text2);margin-bottom:8px;">OPEN PORTS</h4>' +
    d.ports.map(p => {
      const pi = getRisk(p); const rc = riskClass(pi.r);
      return `<a href="http://${d.ip}:${p}" target="_blank" class="port-link-card ${pi.r==='HIGH'||pi.r==='CRITICAL'?'port-risky':''}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-family:'JetBrains Mono';font-size:0.85rem">${p} — ${pi.n}</span>
          <span class="risk-tag ${rc}">${pi.r}</span>
        </div>
        <span style="font-size:0.65rem;color:var(--text2)">${pi.d}</span>
      </a>`;
    }).join('');

  // Service matches
  const svcs = matchServices(d.ports);
  if (svcs.length) {
    links.innerHTML += '<div class="det-section"><h4>Detected Services</h4>' +
      svcs.map(s => `<div class="svc-match"><b>${s.name||s.Name}</b><br><span style="color:var(--text2)">${(s.description||s.Description||'').substring(0,120)}</span></div>`).join('') + '</div>';
  }

  if (!knownIps.includes(d.ip)) {
    links.innerHTML += `<button class="btn btn-p" style="margin-top:15px;width:100%" onclick="markKnown('${d.ip}')">✅ MARK AS KNOWN</button>`;
  }
  panel.classList.toggle('sec-border', secMode);
  panel.style.display = 'block';
}

function markKnown(ip) {
  if (!knownIps.includes(ip)) {
    knownIps.push(ip); localStorage.setItem('dash_known_ips', JSON.stringify(knownIps));
    log(`Device marked as Known: ${ip}`); closeDetails();
    const d = devices.find(x=>x.ip===ip); if(d) d.status='ONLINE';
    renderGrid(); updateStats();
  }
}

function closeDetails() { document.getElementById('details-panel').style.display = 'none'; }
function log(m, col) {
  const div = document.createElement('div'); div.style.color = col||'inherit';
  div.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
  document.getElementById('scan-log').prepend(div);
}

function updateStats() {
  document.getElementById('count-online').textContent = devices.filter(d=>d.status==='ONLINE').length;
  document.getElementById('count-unknown').textContent = devices.filter(d=>d.status==='UNKNOWN').length;
  const atRisk = devices.filter(d=>(d.status==='ONLINE'||d.status==='UNKNOWN') && hasHighRisk(d.ports)).length;
  document.getElementById('count-risk').textContent = atRisk;
}

function updatePresetInfo() {
  const el = document.getElementById('preset-details');
  if (el) { const p = document.getElementById('port-preset').value; el.textContent = 'Ports: ' + PORT_PRESETS[p].join(', '); }
}

function finishScan() {
  scanning = false; document.getElementById('scan-btn').textContent = '⚡ SCAN';
  speak('Scan complete');
  log('Scan complete.'); renderGrid(); updateStats();
}

function resetAllDevices() { if(confirm('Clear all device history?')){localStorage.clear();location.reload();} }

// Internet connectivity check every 60s
let inetUp = true;
async function checkInternet() {
  const now = new Date().toLocaleTimeString();
  try {
    const ac = new AbortController();
    const t = setTimeout(() => ac.abort(), 3000);
    await fetch('http://192.168.1.254', { mode: 'no-cors', signal: ac.signal });
    clearTimeout(t);
    if (!inetUp) { inetUp = true; log('🟢 Internet gateway ONLINE'); }
    document.getElementById('inet-dot').className = 'inet-dot inet-up';
    document.getElementById('inet-label').textContent = 'WAN ✓';
    document.getElementById('inet-label').style.color = 'var(--green)';
  } catch(e) {
    if (inetUp) { inetUp = false; log('🔴 Internet gateway OFFLINE', 'red'); speak('Warning: Internet gateway offline', true); triggerEdgeAlert('red'); }
    document.getElementById('inet-dot').className = 'inet-dot inet-down';
    document.getElementById('inet-label').textContent = 'WAN ✗';
    document.getElementById('inet-label').style.color = 'var(--red)';
  }
  document.getElementById('wan-time').textContent = now;
}
setInterval(checkInternet, 60000);

(async () => { await loadRegistries(); initDevices(); updatePresetInfo(); checkInternet(); })();
</script>
</body>
</html>
